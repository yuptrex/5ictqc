<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TicTacITZ| Ultimate Elite Edition</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
:root {
  --neon-cyan: #00f0ff;
  --neon-pink: #ff00ff;
  --neon-orange: #ffaa00;
  --bg-dark: #050508;
  --panel-bg: rgba(10, 10, 15, 0.95);
  --border-glow: rgba(0, 240, 255, 0.3);
  --pubg-yellow: #f2a900;
  --pubg-dark: #121212;
}

* { 
    box-sizing: border-box; 
    -webkit-tap-highlight-color: transparent; 
    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; 
}

body, html {
  margin: 0; padding: 0; width: 100%; height: 100%;
  background-color: var(--bg-dark); color: #fff; overflow: hidden;
}

.main-container {
  width: 100%; height: 100%; display: flex; flex-direction: column;
  background: radial-gradient(circle at center, #111118 0%, #000000 100%);
  position: relative;
}

/* Global Transition Loader */
#globalLoader {
    position: fixed; inset: 0; z-index: 9999;
    background: rgba(5,5,8,0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    transition: opacity 0.3s ease; opacity: 0; pointer-events: none;
}
#globalLoader.active { opacity: 1; pointer-events: auto; }

.loader-spinner {
    width: 60px; height: 60px; border: 4px solid rgba(0, 240, 255, 0.1);
    border-top-color: var(--neon-cyan); border-right-color: var(--neon-pink);
    border-radius: 50%; animation: spin 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
    box-shadow: 0 0 30px rgba(0, 240, 255, 0.2);
}
.loader-text {
    margin-top: 20px; font-weight: 900; letter-spacing: 4px; color: var(--neon-cyan);
    font-size: 0.8rem; text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
    animation: pulse 1.5s infinite alternate;
}
@keyframes spin { 100% { transform: rotate(360deg); } }
@keyframes pulse { 0% { opacity: 0.5; } 100% { opacity: 1; } }

/* 30s Circle Timer */
.timer-container { position: absolute; top: 20px; left: 20px; width: 55px; height: 55px; z-index: 200; display: none; }
.timer-svg { transform: rotate(-90deg); width: 55px; height: 55px; }
.timer-bg { fill: none; stroke: rgba(255,255,255,0.05); stroke-width: 4; }
.timer-bar {
  fill: none; stroke: var(--neon-cyan); stroke-width: 4;
  stroke-dasharray: 126; stroke-dashoffset: 0; 
  transition: stroke-dashoffset 0.1s linear, stroke 0.5s ease;
}
.timer-text {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  font-size: 0.9rem; font-weight: 900; color: #fff;
}

/* Screens & Panels */
.screen { flex: 1; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 25px; overflow-y: auto; width: 100%; height: 100%; position: absolute;}
.screen.active { display: flex; }
.panel { width: 100%; max-width: 420px; background: var(--panel-bg); padding: 35px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 20px 50px rgba(0,0,0,0.8); }

input, select { 
    width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 18px; 
    border-radius: 15px; margin-bottom: 15px; font-size: 1rem; transition: 0.3s; 
    outline: none; text-align: center; font-weight: bold; appearance: none;
}
input:focus, select:focus { border-color: var(--neon-cyan); box-shadow: 0 0 15px rgba(0, 240, 255, 0.15); }

/* Buttons */
button { width: 100%; padding: 18px; border-radius: 15px; border: none; font-weight: 900; cursor: pointer; text-transform: uppercase; margin-bottom: 12px; font-size: 0.95rem; letter-spacing: 1px; transition: 0.2s; }
button:active { transform: scale(0.96); }
.btn-p { background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink)); color: #000; }
.btn-s { background: transparent; border: 1px solid var(--neon-cyan); color: var(--neon-cyan); }
.btn-danger { background: rgba(255,0,0,0.1); border: 1px solid #ff0033; color: #ff0033; }
.btn-gold { background: linear-gradient(90deg, #ffaa00, #ff00ff); color: #000; }

/* ========================================================= */
/* PUBG-STYLE TACTICAL LOBBY (NEW)                           */
/* ========================================================= */
.lobby-layout {
    display: grid;
    grid-template-areas: 
        "top-left top-right"
        "center center"
        "bottom-left bottom-right";
    grid-template-rows: auto 1fr auto;
    grid-template-columns: 1fr 1fr;
    width: 100%; height: 100%;
    padding: 20px; gap: 20px;
    background: url('https://images.unsplash.com/photo-1605379399642-870262d3d051?q=80&w=2000&auto=format&fit=crop') center/cover no-repeat;
    background-blend-mode: overlay;
    background-color: rgba(5,5,8,0.85); /* Dark overlay */
}

.tactical-box { background: rgba(10, 10, 15, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 15px; }

/* Top Left: Player Intel */
.lobby-intel { grid-area: top-left; align-self: start; justify-self: start; min-width: 250px; }
.lobby-intel h1 { margin: 0; font-size: 1.5rem; color: #fff; text-transform: uppercase; letter-spacing: 2px; }
.xp-wrapper { width: 100%; padding: 10px 0 0 0; }
.xp-label { font-size: 0.75rem; color: var(--pubg-yellow); margin-bottom: 5px; font-weight: 800; letter-spacing: 1px; }
.xp-bg { height: 8px; background: #000; border-radius: 10px; border: 1px solid rgba(255,170,0,0.3); }
.xp-fill { height: 100%; width: 0%; background: var(--pubg-yellow); box-shadow: 0 0 10px var(--pubg-yellow); transition: width 1s ease-out; }

/* Top Right: Arsenal / Currencies */
.lobby-wealth { grid-area: top-right; align-self: start; justify-self: end; text-align: right; display: flex; gap: 15px; }
.wealth-item { background: rgba(0,0,0,0.6); padding: 8px 15px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); }
.wealth-item span { font-weight: 900; font-size: 1.1rem; }

/* Center: Visual Space (could be for character model later) */
.lobby-center { grid-area: center; display: flex; align-items: center; justify-content: center; }
.center-logo { opacity: 0.1; font-size: 4rem; font-weight: 900; text-align: center; letter-spacing: 10px; transform: rotate(-5deg); pointer-events: none; }

/* Bottom Left: Comms & Join */
.lobby-comms { grid-area: bottom-left; align-self: end; justify-self: start; display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 300px; }
.tactical-input { background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.2); padding: 12px; margin: 0; text-align: left; }
.btn-tactical { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); color: #fff; margin:0; padding: 12px; }
.btn-tactical:hover { background: rgba(255,255,255,0.2); }

/* Bottom Right: MATCH START */
.lobby-start { grid-area: bottom-right; align-self: end; justify-self: end; display: flex; flex-direction: column; gap: 10px; align-items: flex-end; }
.btn-massive-start { 
    background: var(--pubg-yellow); color: #000; font-size: 1.5rem; padding: 20px 40px; 
    border-radius: 8px; font-weight: 900; letter-spacing: 3px; box-shadow: 0 0 20px rgba(242, 169, 0, 0.4);
    border: 2px solid #fff; margin:0; clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0 30%);
}
.btn-massive-start:active { transform: scale(0.95); }

/* ========================================================= */

/* Arena UI */
.score-board { display: flex; gap: 20px; margin-top: 60px; align-items: flex-start; justify-content: center; width: 100%; }
.score-node { text-align: center; display: flex; flex-direction: column; align-items: center; width: 130px; position: relative; }
.score-node small { font-size: 0.7rem; opacity: 0.6; letter-spacing: 2px; }
.score-node b { font-size: 4rem; display: block; line-height: 1.1; font-weight: 900; margin: 5px 0; }
.x-text { color: var(--neon-cyan); text-shadow: 0 0 25px rgba(0, 240, 255, 0.6); }
.o-text { color: var(--neon-pink); text-shadow: 0 0 25px rgba(255, 0, 255, 0.6); }

.player-name {
    font-size: 0.7rem; font-weight: 800; text-transform: uppercase;
    letter-spacing: 1px; padding: 8px; border-radius: 8px;
    background: rgba(0,0,0,0.6); width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3;
}
.player-email { display: block; font-size: 0.5rem; text-transform: lowercase; color: rgba(255,255,255,0.5); margin-top: 2px; letter-spacing: 0; }
.x-name { border: 1px solid rgba(0, 240, 255, 0.3); color: var(--neon-cyan); }
.o-name { border: 1px solid rgba(255, 0, 255, 0.3); color: var(--neon-pink); }

/* The Board & Slow-Mo Effect */
.arena-header-container { position: absolute; top: 20px; right: 20px; display: flex; flex-direction: column; align-items: flex-end; z-index: 50;}
.arena-header { background: rgba(0, 240, 255, 0.1); border: 1px dashed var(--neon-cyan); padding: 8px 15px; border-radius: 12px; cursor: pointer; text-align: center; }
.arena-header small { display: block; font-size: 0.5rem; color: var(--neon-cyan); letter-spacing: 1px; }
.arena-header b { font-size: 1rem; letter-spacing: 2px; }
.spectator-box { margin-top: 5px; background: rgba(0,0,0,0.6); padding: 5px 10px; border-radius: 8px; font-size: 0.7rem; color: var(--pubg-yellow); border: 1px solid rgba(242,169,0,0.3); display: none;}

.board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 100%; max-width: 400px; margin: 30px 0; position: relative; }
.cell {
  aspect-ratio: 1/1; background: rgba(255,255,255,0.02); border-radius: 20px;
  display: flex; justify-content: center; align-items: center; font-size: 3.5rem; font-weight: 900;
  border: 1px solid rgba(255,255,255,0.06); cursor: pointer; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.cell:active { transform: scale(0.9); }

@keyframes popIn { 0% { transform: scale(0.3); opacity: 0; } 70% { transform: scale(1.1); } 100% { transform: scale(1); opacity: 1; } }
.pop-anim { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

.electric-flash {
    animation: electric 0.5s infinite alternate; z-index: 10;
    box-shadow: 0 0 40px var(--neon-cyan), inset 0 0 20px var(--neon-cyan);
    border-color: var(--neon-cyan); filter: brightness(3) contrast(1.5); transform: scale(1.05);
}
.dimmed { opacity: 0.15; pointer-events: none; filter: grayscale(100%); transition: 0.5s; }
@keyframes electric { 0% { opacity: 0.8; } 100% { opacity: 1; } }

/* Status Text */
.status-pill { padding: 12px 30px; border-radius: 50px; background: rgba(0, 0, 0, 0.6); color: var(--neon-cyan); font-weight: 800; border: 1px solid var(--border-glow); text-transform: uppercase; font-size: 0.9rem; letter-spacing: 1px; margin-top: 15px; text-align: center; transition: 0.3s; }

/* Overlays */
.overlay { position: fixed; inset: 0; background: rgba(5,5,8,0.98); z-index: 1000; display: none; flex-direction: column; padding: 25px; backdrop-filter: blur(10px); }
.chat-msg-area { flex: 1; overflow-y: auto; padding: 20px 0; display: flex; flex-direction: column; gap: 15px; }
.bubble { padding: 15px 22px; border-radius: 20px; max-width: 85%; line-height: 1.4; font-size: 0.95rem; }
.b-me { align-self: flex-end; background: var(--neon-cyan); color: #000; font-weight: 700; border-bottom-right-radius: 5px; }
.b-them { align-self: flex-start; background: #15151a; border: 1px solid var(--neon-pink); border-bottom-left-radius: 5px; }

/* Emoji Taunts */
.taunt-bar { display: flex; gap: 10px; justify-content: center; margin-bottom: 15px; width: 100%; max-width: 400px; }
.taunt-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); font-size: 1.5rem; padding: 8px 12px; border-radius: 12px; cursor: pointer; transition: 0.2s; margin-bottom: 0; }
.taunt-btn:active { transform: scale(0.8); background: var(--neon-cyan); }
.floating-emoji { position: absolute; font-size: 3rem; pointer-events: none; animation: floatUp 2s cubic-bezier(0.1, 0.8, 0.3, 1) forwards; z-index: 500; text-shadow: 0 0 20px rgba(255,255,255,0.5); }
@keyframes floatUp { 0% { transform: translateY(0) scale(0.5); opacity: 0; } 20% { transform: translateY(-30px) scale(1.2); opacity: 1; } 100% { transform: translateY(-100px) scale(1); opacity: 0; } }

/* Leaderboard */
.leaderboard-row { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 0.9rem; align-items: center; }
.leaderboard-row:nth-child(1) { color: gold; font-weight: 900; font-size: 1.1rem; background: rgba(255, 215, 0, 0.1); border-radius: 10px; }
.leaderboard-row:nth-child(2) { color: silver; font-weight: bold; }
.leaderboard-row:nth-child(3) { color: #cd7f32; font-weight: bold; }
.lb-rank { display: inline-block; width: 30px; text-align: left; }
</style>
</head>
<body>

<div id="globalLoader">
    <div class="loader-spinner"></div>
    <div id="loaderText" class="loader-text">SYNCING MAINFRAME...</div>
</div>

<div class="main-container">
    
    <div id="gameTimer" class="timer-container" style="display: none;">
        <svg class="timer-svg"><circle class="timer-bg" cx="27.5" cy="27.5" r="23"></circle><circle id="timerCircle" class="timer-bar" cx="27.5" cy="27.5" r="23"></circle></svg>
        <div id="timerText" class="timer-text">30</div>
    </div>

    <div id="auth" class="screen active" style="justify-content: center;">
        <div class="panel">
            <h2 style="text-align:center; color:var(--neon-cyan); letter-spacing: 4px; margin-bottom: 30px;">ITZ Authentication</h2>
            <input id="email" type="email" placeholder="EMAIL ADDRESS">
            <input id="password" type="password" placeholder="PASSWORD">
            <button class="btn-p" onclick="window.handleAuth('signIn')">AUTHORIZE LOGIN</button>
            <button class="btn-s" onclick="window.handleAuth('signUp')">AUTHORIZE SIGNUP</button>
        </div>
    </div>

    <div id="menu" class="screen" style="padding:0;">
        <div class="lobby-layout">
            
            <div class="lobby-intel tactical-box">
                <h1 id="playerName">---</h1>
                <div style="font-size:0.8rem; color: rgba(255,255,255,0.6); margin-top:3px;">
                    ELITE OPERATIVE 
                    <button onclick="window.changeName()" style="background:transparent; border:none; color:var(--neon-cyan); text-decoration:underline; cursor:pointer; font-size:0.7rem; padding:0; margin-left:10px; width: auto; font-weight: bold;">[EDIT NAME]</button>
                </div>
                <div class="xp-wrapper">
                    <div class="xp-label">LVL <span id="level">1</span> <span style="float:right;" id="streakDisplay" class="streak-fire">🔥 0</span></div>
                    <div class="xp-bg"><div id="xpFill" class="xp-fill"></div></div>

            </div>

            <div class="lobby-wealth">

            <div class="lobby-center">
                <div class="center-logo">NEON<br>ARENA</div>
            </div>

            <div class="lobby-comms">

                    <input id="roomInput" class="tactical-input" placeholder="ENTER 6-DIGIT CODE">
                    <div style="display:flex; gap:10px;">
                        <button class="btn-tactical" style="flex:1;" onclick="window.joinArena()">JOIN</button>
                        <button class="btn-tactical" style="flex:1;" onclick="window.spectateArena()">SPECTATE</button>
                    </div>
                </div>
                <div style="display:flex; gap:10px;">
                    <button class="btn-tactical" style="flex:1; border-color:var(--neon-cyan); color:var(--neon-cyan);" onclick="window.openLeaderboard()">Server Rank </button>
                    <button class="btn-tactical" style="flex:1; border-color:#ff0033; color:#ff0033;" onclick="window.logout()">LOGOUT</button>
                </div>
            </div>

            <div class="lobby-start">
                <button class="btn-massive-start" onclick="window.createArena()">START MATCH<br><span style="font-size:0.7rem; color:rgba(0,0,0,0.6);">COST: 100 ⭐</span></button>
            </div>

        </div>
    </div>

    <div id="game" class="screen" style="justify-content: center;">
        
        <div class="arena-header-container">
            <div class="arena-header" onclick="window.copyCode()">
                <small id="copyStatus">TAP TO COPY</small>
                <b id="arenaTag">------</b>
            </div>
            <div id="spectatorBox" class="spectator-box">👁️ Watchers: 0</div>
        </div>
        
        <div class="score-board">
            <div class="score-node" id="nodeX">
                <small>PLAYER X</small>
                <b id="xWins" class="x-text">0</b>
                <div id="xNameDisplay" class="player-name x-name">WAITING...</div>
            </div>
            <div style="font-size:1.8rem; opacity:0.3; font-weight:900; margin-top:20px;">VS</div>
            <div class="score-node" id="nodeO">
                <small>PLAYER O</small>
                <b id="oWins" class="o-text">0</b>
                <div id="oNameDisplay" class="player-name o-name">WAITING...</div>
            </div>
        </div>
        
        <div id="status" class="status-pill">SYNCING...</div>
        
        <div class="board" id="board"></div>
        
        <div id="tauntControls" class="taunt-bar">
            <button class="taunt-btn" onclick="window.sendTaunt('😂')">😂</button>
            <button class="taunt-btn" onclick="window.sendTaunt('😲')">😲</button>
            <button class="taunt-btn" onclick="window.sendTaunt('🎮')">🎮</button>

    <div class="overlay" id="matchEndModal" style="justify-content:center; align-items:center;">
        <div class="panel" style="text-align:center;">
            <h1 id="endTitle" style="color:var(--neon-cyan); font-size:2.5rem; margin-bottom:5px;">VICTORY</h1>
            <p id="endReason" style="opacity:0.8; margin-bottom:30px; font-weight:bold;">Reason here</p>
            <button class="btn-p" onclick="window.exitToMenu()">RETURN TO LOBBY</button>
        </div>
    </div>

    <div class="overlay" id="chatOverlay">
        <div style="display:flex; justify-content:space-between; align-items:center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px;">
            <h2 style="color:var(--neon-pink); margin:0; letter-spacing: 2px;">COMM-LINK</h2>

        <div style="display:flex; gap:10px; padding-bottom:10px;" id="chatInputArea">

                </div>

            <button class="btn-s" onclick="document.getElementById('leaderboardOverlay').style.display='none'">CLOSE ARCHIVES</button>

    </div>

</div>

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

    lose: new Audio('https://cdn.pixabay.com/download/audio/2022/03/24/audio_349dce53b2.mp3'),
    click: new Audio('https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8b8175bbf.mp3') 
};
audio.lobby.loop = true; audio.lobby.volume = 0.4; 
audio.arena.loop = true; audio.arena.volume = 0.5;

const loaderEl = document.getElementById("globalLoader");
const loaderText = document.getElementById("loaderText");

async function withLoader(text, asyncFn) {
    loaderText.innerText = text;
    loaderEl.classList.add("active");
    try { 
        await new Promise(r => setTimeout(r, 400)); 
        await asyncFn(); 
    } 
    catch(e) { console.error(e); alert("ERROR: " + e.message); }
    finally { setTimeout(() => loaderEl.classList.remove("active"), 300); }
}

function switchScreen(targetId) {
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    document.getElementById(targetId).classList.add("active");
    
    const timerUI = document.getElementById("gameTimer");
    
    if(targetId === "game") {
        timerUI.style.display = "block"; // Timer ONLY visible in game
        switchMusic('arena');
    } else {
        timerUI.style.display = "none";
        if(targetId === "menu") switchMusic('lobby');
        else switchMusic('none');
    }
}

window.changeName = async () => {
    if(!user) return;
    
    withLoader("VERIFYING CLEARANCE...", async () => {
        const r = ref(db, `users/${user.uid}`);
        const snap = await get(r);
        const d = snap.val();
        
        // Get today's date in YYYY-MM-DD format (local time)
        const today = new Date().toISOString().split('T')[0];
        
        let changesToday = d.nameChangesToday || 0;
        let lastChangeDate = d.lastNameChangeDate || "";

        // Reset if it's a new day
        if (lastChangeDate !== today) {
            changesToday = 0;
        }

        if (changesToday >= 2) {
            alert("AUTHORIZATION DENIED: Daily name change limit reached (2/2). Try again tomorrow.");
            return;
        }

        const newName = prompt(`Enter new operative name (Changes remaining today: ${2 - changesToday}):\nMax 12 characters.`, d.name);
        
        if(!newName || newName.trim() === "" || newName === d.name) return; // Cancelled or no change
        
        if(newName.length > 12) {
            alert("NAME TOO LONG. MAX 12 CHARACTERS.");
            return;
        }

        await update(r, { 
            name: newName.trim().toUpperCase(),
            nameChangesToday: changesToday + 1,
            lastNameChangeDate: today
        });
        
        alert("OPERATIVE NAME UPDATED SUCESSFULLY.");
    });
};

window.createArena = () => {

            playerX: { name: s.val().name, email: user.email }, playerO: null 
        });

window.joinArena = () => {
    roomId = document.getElementById("roomInput").value.toUpperCase();
    if(!roomId) return alert("ENTER ARENA CODE");
    
    withLoader("UPLINKING TO ARENA...", async () => {
        const s = await get(ref(db, `users/${user.uid}`));
        gameRef = ref(db, `arenas/${roomId}`);
        const snap = await get(gameRef);
        
        if(snap.exists() && !snap.val().playerO) {
            playerSide = "O";
            await update(gameRef, { 
                playerO: { name: s.val().name, email: user.email }, 
                lastMoveTime: serverTimestamp() 
            });
            setupArenaUI();
            startSync();
        } else {
            throw new Error("ARENA CODE INVALID, EXPIRED, OR FULL");
        }
    });
};

window.spectateArena = () => {

    withLoader("BYPASSING SECURITY (SPECTATOR)...", async () => {

    document.getElementById("tauntControls").style.display = playerSide === "SPECTATOR" ? "none" : "flex";

// ---------------------------------------------------------
// CORE GAME LOOP & SYNC
// ---------------------------------------------------------
function startSync() {
    if(playerSide !== "SPECTATOR") {
        onValue(ref(db, ".info/connected"), (snap) => {
            if (snap.val() === true && gameRef) {
                const myPresenceRef = ref(db, `arenas/${roomId}/presence/${playerSide}`);
                onDisconnect(myPresenceRef).set(serverTimestamp());
                set(myPresenceRef, "online");
            }
        });
    }
    
    // Spectator Real-Time Updates
    onValue(ref(db, `arenas/${roomId}/spectators`), snap => {
        const specDiv = document.getElementById("spectatorBox");
        const specs = snap.val();
        if(specs) {
            const specNames = Object.values(specs).map(s => s.name).join(', ');
            specDiv.innerText = `👁️ ${Object.keys(specs).length} Watching (${specNames})`;
            specDiv.style.display = "block";
        } else {
            specDiv.style.display = "none";
        }
    });
    
    onValue(gameRef, s => {
        const d = s.val(); if(!d) return;
        
        const formatName = (p) => p ? `${p.name}<span class="player-email">${p.email}</span>` : "WAITING...";
        document.getElementById("xNameDisplay").innerHTML = formatName(d.playerX);
        document.getElementById("oNameDisplay").innerHTML = formatName(d.playerO);
        
        board = d.board || Array(9).fill("");
        winLine = d.winLine || [];
        
        document.getElementById("xWins").innerText = d.xWins; 
        document.getElementById("oWins").innerText = d.oWins;
        
        updateStatusHeader(d);
        renderBoard(d);
        handleTimer(d);
        
        if(d.winner && !window.isProcessingRound) { 
            window.isProcessingRound = true; 
            audio.arena.pause();
            
            if(d.winner === playerSide) audio.win.play().catch(()=>{});
            else if(d.winner !== "Draw" && playerSide !== "SPECTATOR") audio.lose.play().catch(()=>{});

            setTimeout(() => processRoundEnd(d), 2500); 
        }
        else if(!d.winner) {
            window.isProcessingRound = false;
        }
    });

    onChildAdded(ref(db, `arenas/${roomId}/chat`), s => renderMessage(s.val()));
    onChildAdded(ref(db, `arenas/${roomId}/taunts`), s => renderTaunt(s.val()));
}

function updateStatusHeader(d) {
    const statusEl = document.getElementById("status");
    if (d.winner) {
        statusEl.innerText = d.winner === "Draw" ? "ROUND DRAW" : `WINNER: ${d.winner} (${d.reason})`;
        statusEl.style.borderColor = "var(--neon-pink)"; statusEl.style.color = "var(--neon-pink)";
    } else if (!d.playerO) {
        statusEl.innerText = "WAITING FOR OPPONENT...";
        statusEl.style.borderColor = "var(--border-glow)"; statusEl.style.color = "var(--neon-cyan)";
    } else {
        if(playerSide === "SPECTATOR") statusEl.innerText = `TURN: PLAYER ${d.turn}`;
        else statusEl.innerText = d.turn === playerSide ? "YOUR TURN" : "RIVAL'S TURN";
        statusEl.style.borderColor = "var(--border-glow)"; statusEl.style.color = "var(--neon-cyan)";
    }
}

// ---------------------------------------------------------
// TIMER DYNAMICS
// ---------------------------------------------------------
function handleTimer(d) {
    clearInterval(timerInt);
    if(d.winner || !d.playerO) {
        document.getElementById("timerText").innerText = "30";
        document.getElementById("timerCircle").style.strokeDashoffset = 0;
        document.getElementById("timerCircle").style.stroke = "var(--neon-cyan)";
        audio.arena.playbackRate = 1.0;
        return;
    }
    
    timerInt = setInterval(async () => {
        const exactNow = Date.now() + serverOffset; 
        
        if (d.presence && playerSide !== "SPECTATOR") {
            const oppSide = playerSide === "X" ? "O" : "X";
            const oppStatus = d.presence[oppSide];
            if (typeof oppStatus === 'number' && exactNow - oppStatus >= 10000 && !d.winner) {
                clearInterval(timerInt);
                await update(gameRef, { winner: playerSide, winLine:[], reason: "Opponent Abandoned" });
                return;
            }
        }

        const diffInSeconds = (exactNow - d.lastMoveTime) / 1000;
        const remaining = Math.max(0, 30 - diffInSeconds);
        
        document.getElementById("timerText").innerText = Math.ceil(remaining);
        document.getElementById("timerCircle").style.strokeDashoffset = 126 - (remaining / 30) * 126;
        document.getElementById("timerCircle").style.stroke = remaining <= 10 ? "#ff0033" : "var(--neon-cyan)";

        audio.arena.playbackRate = (remaining <= 10 && remaining > 0) ? 1.25 : 1.0;

        if(remaining <= 0 && d.turn === playerSide && !d.winner && playerSide !== "SPECTATOR") {
            clearInterval(timerInt);
            const win = playerSide === "X" ? "O" : "X";
            await update(gameRef, { winner: win, winLine:[], reason: "Time Limit Exceeded" });
        }
    }, 100);
}

// ---------------------------------------------------------
// BOARD LOGIC
// ---------------------------------------------------------
function renderBoard(d) {
    const b = document.getElementById("board"); 
    b.innerHTML = "";
    
    board.forEach((v, i) => {
        const c = document.createElement("div");
        c.className = `cell ${v === 'X' ? 'x-text' : (v === 'O' ? 'o-text' : '')}`;
        
        if(winLine && winLine.length > 0) {
            if(winLine.includes(i)) c.classList.add("electric-flash");
            else c.classList.add("dimmed");
        } else if (v) {
            c.classList.add("pop-anim");
        }

        c.innerText = v;
        c.onclick = async () => {
            if(playerSide === "SPECTATOR" || d.winner || !d.playerO || d.turn !== playerSide || board[i] !== "") return;
            
            const freshSnap = await get(gameRef); const freshData = freshSnap.val();
            if(freshData.board[i] !== "" || freshData.turn !== playerSide) return;

            let nb = [...board]; nb[i] = playerSide;
            let result = checkWin(nb);
            
            let w = result ? result.w : "";
            let wLine = result ? result.line : [];
            let reasonText = w ? (w === "Draw" ? "Round Draw" : "Standard Win") : "";
            
            const currentMoveLog = freshData.moveLog || [];
            currentMoveLog.push({ by: playerSide, board: nb });

            update(gameRef, { 
                board: nb, turn: playerSide === "X" ? "O" : "X", 
                winner: w, winLine: wLine, reason: reasonText, 
                moveLog: currentMoveLog,
                lastMoveTime: serverTimestamp() 
            });
        };
        b.appendChild(c);
    });
}

function checkWin(b) {
    const p = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    for(let i=0; i<p.length; i++) {
        let [x,y,z] = p[i];
        if(b[x] && b[x]===b[y] && b[x]===b[z]) return { w: b[x], line: p[i] };
    }
    return b.includes("") ? null : { w: "Draw", line: [] };
}

// ---------------------------------------------------------
// COMPLETION
// ---------------------------------------------------------
async function processRoundEnd(d) {
    let nx = d.xWins + (d.winner === "X" ? 1 : 0);
    let no = d.oWins + (d.winner === "O" ? 1 : 0);
    
    if(nx >= 4 || no >= 4 || d.reason.includes("Forfeit") || d.reason.includes("Offline") || d.reason.includes("Time Limit")) { 
        if(playerSide !== "SPECTATOR") {
            await finalizeUserStats(d.winner);
            if(playerSide === "X") await sendMatchLog(d, d.winner, d.reason); 
        }
        
        document.getElementById("endTitle").innerText = d.winner === playerSide ? "VICTORY" : (d.winner === "Draw" ? "DRAW" : "DEFEAT");
        document.getElementById("endTitle").style.color = d.winner === playerSide ? "var(--neon-cyan)" : (d.winner === "Draw" ? "#fff" : "var(--neon-pink)");
        document.getElementById("endReason").innerText = `Reason: ${d.reason.toUpperCase()}`;
        document.getElementById("matchEndModal").style.display = "flex";
        
    } else { 
        if(playerSide === "X") { 
            update(gameRef, { board: Array(9).fill(""), turn: "X", winner: "", winLine: [], reason: "", xWins: nx, oWins: no, moveLog: [], lastMoveTime: serverTimestamp() }); 
        }
    }
}

async function finalizeUserStats(w) {
    const r = ref(db, `users/${user.uid}`), s = await get(r), d = s.val();
    let exp = (d.exp || 0) + (w === playerSide ? 50 : 10), lvl = d.level || 1;
    while(exp >= 100) { exp -= 100; lvl++; }
    
    let currentStreak = d.streak || 0;
    let newStreak = (w === playerSide) ? currentStreak + 1 : ((w === "Draw") ? currentStreak : 0);

    await update(r, { 
        exp, level: lvl, 
        playPoints: (d.playPoints || 0) + (w === playerSide ? 200 : 20), 
        pebbles: (d.pebbles || 0) + (w === playerSide ? 15 : 5),
        streak: newStreak
    });
}

// ---------------------------------------------------------
// TELEGRAM LOG
// ---------------------------------------------------------
async function sendMatchLog(d, matchWinner, finalReason) {
    let txt = `🏆 NEON ARENA FULL MATCH LOG\n`;
    txt += `🆔 Arena: ${roomId}\n\n`;
    txt += `👤 X: ${d.playerX?.name || 'UNKNOWN'}\n`;
    txt += `👤 O: ${d.playerO?.name || 'UNKNOWN'}\n\n`;
    
    if(d.moveLog && d.moveLog.length > 0) {
        d.moveLog.forEach((m, i) => {
            txt += `🔹 Move ${i+1} by ${m.by}\n\n`;
            const cell = (val) => val === "" ? "." : val;
            txt += `| ${cell(m.board[0])} | ${cell(m.board[1])} | ${cell(m.board[2])} |\n`;
            txt += `| ${cell(m.board[3])} | ${cell(m.board[4])} | ${cell(m.board[5])} |\n`;
            txt += `| ${cell(m.board[6])} | ${cell(m.board[7])} | ${cell(m.board[8])} |\n\n`;
        });
    }

    txt += `⚠️ Result: ${matchWinner === 'Draw' ? 'NO WINNER' : 'PLAYER ' + matchWinner} WINS (${finalReason})`;

    fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, { 
        method: "POST", headers: {"Content-Type": "application/json"}, 
        body: JSON.stringify({chat_id: userChat, text: txt})
    });
}

window.fetchLeaderboardData = async () => {
    const metric = document.getElementById("rankSelect").value;
    const list = document.getElementById("leaderboardList");
    
    list.innerHTML = `<div class="loader-spinner" style="margin: 30px auto; width: 40px; height: 40px;"></div><div style="text-align:center; color: var(--neon-cyan); letter-spacing: 2px;">QUERYING MAINFRAME...</div>`;
    
    try {
        const snap = await get(ref(db, 'users'));
        list.innerHTML = "";
        if(!snap.exists()) { list.innerHTML = "<div style='text-align:center;'>NO DATA FOUND.</div>"; return; }

        let players = [];
        snap.forEach(child => { players.push(child.val()); });
        players.sort((a, b) => (b[metric] || 0) - (a[metric] || 0));
        players = players.slice(0, 50);

        players.forEach((p, i) => {
            let statDisplay = "";
            if(metric === "level") statDisplay = `LVL ${p.level}`;
            else if(metric === "pebbles") statDisplay = `🪙 ${p.pebbles || 0}`;
            else if(metric === "streak") statDisplay = `🔥 ${p.streak || 0}`;
            else if(metric === "exp") statDisplay = `${p.exp || 0} XP`;

            list.innerHTML += `
                <div class="leaderboard-row">
                    <div>
                        <span class="lb-rank">#${i+1}</span> 
                        <span style="letter-spacing:1px; text-transform:uppercase;">${p.name}</span>
                    </div>
                    <div style="font-weight:900;">${statDisplay}</div>
                </div>`;
        });
    } catch (e) {
        list.innerHTML = `<div style="text-align:center; color: red;">DATA FETCH FAILED.</div>`;
    }
};

        if (gameRef && playerSide !== "SPECTATOR") {
            const snap = await get(gameRef); const d = snap.val();
            if (d && !d.winner) {
                const opp = playerSide === "X" ? "O" : "X";
                await update(gameRef, { winner: opp, winLine: [], reason: "Player Left (Forfeit)", lastMoveTime: serverTimestamp() });
            }
        }
        window.exitToMenu();
    });
};
