<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NEON ARENA | Tic-Tac-Toe Online</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
  --neon-cyan: #00f0ff;
  --neon-pink: #ff00ff;
  --bg-dark: #050508;
  --glass: rgba(255, 255, 255, 0.05);
}

body {
  margin: 0; height: 100vh; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  display: flex; justify-content: center; align-items: center;
  background: var(--bg-dark); color: #fff; overflow: hidden;
}

/* Animated Grid Background */
body::before {
  content: ""; position: absolute; width: 200%; height: 200%;
  background-image: 
    linear-gradient(rgba(0, 240, 255, 0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0, 240, 255, 0.05) 1px, transparent 1px);
  background-size: 50px 50px;
  transform: perspective(500px) rotateX(60deg);
  animation: grid-move 20s linear infinite;
  z-index: -1;
}

@keyframes grid-move {
  from { transform: perspective(500px) rotateX(60deg) translateY(0); }
  to { transform: perspective(500px) rotateX(60deg) translateY(50px); }
}

.app {
  width: 90%; max-width: 420px; position: relative;
  background: rgba(10, 10, 15, 0.85);
  padding: 30px; border-radius: 30px;
  border: 1px solid rgba(0, 240, 255, 0.3);
  box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 0 20px rgba(0, 240, 255, 0.1);
  backdrop-filter: blur(15px);
  z-index: 10;
}

h2 { text-align: center; color: var(--neon-cyan); text-transform: uppercase; letter-spacing: 2px; }

input {
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
  color: white; padding: 12px; border-radius: 12px; margin-bottom: 10px; width: 100%;
  box-sizing: border-box; outline: none; transition: 0.3s;
}

input:focus { border-color: var(--neon-cyan); box-shadow: 0 0 10px rgba(0, 240, 255, 0.3); }

button {
  width: 100%; padding: 14px; margin: 8px 0; border: none; border-radius: 12px;
  font-weight: 800; cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
  background: linear-gradient(135deg, var(--neon-cyan), var(--neon-pink));
  color: white; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

button:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(255, 0, 255, 0.4); }
button:disabled { opacity: 0.5; cursor: not-allowed; }

/* CHAT POPUP */
.chat-popup {
  position: absolute; bottom: 80px; right: 0; width: 280px; height: 350px;
  background: rgba(5, 5, 10, 0.98); border-radius: 25px; 
  border: 1px solid var(--neon-cyan); display: none; flex-direction: column; 
  padding: 15px; z-index: 100; box-shadow: 0 0 20px rgba(0, 240, 255, 0.2);
  backdrop-filter: blur(10px);
}
.chat-popup.show { display: flex; }

.chat-messages { 
  flex: 1; overflow-y: auto; display: flex; flex-direction: column; 
  gap: 12px; padding: 5px; scroll-behavior: smooth;
}

.msg-bubble {
  padding: 10px 14px; border-radius: 18px; max-width: 85%;
  font-size: 0.85rem; line-height: 1.4; position: relative;
  animation: bubblePop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  word-wrap: break-word;
}

@keyframes bubblePop {
  from { transform: scale(0.5); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.msg-me {
  align-self: flex-end; background: var(--neon-cyan); color: #000;
  border-bottom-right-radius: 2px; box-shadow: 0 4px 15px rgba(0, 240, 255, 0.3);
}

.msg-them {
  align-self: flex-start; background: rgba(255, 255, 255, 0.1); color: #fff;
  border: 1px solid var(--neon-pink); border-bottom-left-radius: 2px;
}

.msg-bubble strong { display: block; font-size: 0.65rem; text-transform: uppercase; margin-bottom: 2px; opacity: 0.8; }

.typing {
  font-style: italic; font-size: 0.7rem; color: var(--neon-pink);
  margin-bottom: 5px; display: none; padding-left: 10px;
}

.dot-flashing {
  display: inline-block; width: 4px; height: 4px; border-radius: 5px;
  background-color: var(--neon-pink); animation: dotFlashing 1s infinite linear;
}

@keyframes dotFlashing { 0% { opacity: 0.2; } 50% { opacity: 1; } 100% { opacity: 0.2; } }

.chat-messages::-webkit-scrollbar { width: 4px; }
.chat-messages::-webkit-scrollbar-thumb { background: var(--neon-cyan); border-radius: 10px; }

/* ARENA ELEMENTS */
.arena-code-banner {
  background: rgba(0, 240, 255, 0.1);
  border: 1px dashed var(--neon-cyan);
  border-radius: 12px; padding: 8px;
  text-align: center; margin-bottom: 5px; cursor: pointer;
}
.arena-code-banner small { font-size: 0.6rem; text-transform: uppercase; opacity: 0.7; display: block; }
.arena-code-banner strong { font-size: 1.2rem; letter-spacing: 3px; color: var(--neon-cyan); }

.series-score-box {
  background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 0, 255, 0.2);
  border-radius: 12px; padding: 5px; text-align: center; margin-bottom: 15px;
}
.series-score-box small { font-size: 0.55rem; text-transform: uppercase; color: var(--neon-pink); opacity: 0.8; letter-spacing: 1px; }
.series-score-box strong { font-size: 1.3rem; letter-spacing: 4px; color: #fff; display: block; }

.board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 20px 0; }
.cell {
  aspect-ratio: 1/1; background: var(--glass); border-radius: 15px;
  display: flex; justify-content: center; align-items: center;
  font-size: 2.5rem; font-weight: 900; cursor: pointer;
  border: 1px solid rgba(255,255,255,0.05); transition: 0.2s;
}
.cell:hover { background: rgba(255,255,255,0.1); border-color: var(--neon-cyan); }
.cell.x-mark { color: var(--neon-cyan); text-shadow: 0 0 15px var(--neon-cyan); }
.cell.o-mark { color: var(--neon-pink); text-shadow: 0 0 15px var(--neon-pink); }

.status-pill {
  background: rgba(0,0,0,0.4); padding: 10px; border-radius: 50px;
  text-align: center; font-size: 0.9rem; border: 1px solid rgba(0, 240, 255, 0.2);
  margin-bottom: 15px; color: var(--neon-cyan);
}

.hidden { display: none; }
</style>
</head>
<body>

<div class="app">
  <div id="auth">
    <h2>ITZ Authentication</h2>
    <input id="email" placeholder="Email Address">
    <input id="password" type="password" placeholder="Password">
    <button onclick="window.signUp()">Sign Up</button>
    <button onclick="window.signIn()" style="background: transparent; border: 1px solid var(--neon-cyan)">Sign in </button>
  </div>

  <div id="menu" class="hidden">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
      <div>
        <span id="playerName" style="color: var(--neon-cyan); font-weight:bold;">Player</span>
        <div style="font-size:0.7rem; opacity:0.6;">LVL <span id="level">1</span></div>
      </div>
      <div style="text-align:right">
        <span style="font-size: 0.7rem; opacity: 0.8;">⭐ <span id="ppDisplay">0</span></span><br>
        <span style="color:gold">🪙</span> <span id="pebbles">0</span>
      </div>
    </div>
    
    <div style="height:6px; background:#111; border-radius:10px; margin-bottom:20px; overflow:hidden; border: 1px solid rgba(255,255,255,0.1);">
      <div id="levelProgress" style="height:100%; width:0%; background:linear-gradient(90deg, var(--neon-cyan), var(--neon-pink)); transition: width 0.8s ease-in-out; box-shadow: 0 0 10px var(--neon-cyan);"></div>
    </div>

    <button onclick="window.createArena()">Create Arena (-10 ⭐)</button>
    <div style="margin:15px 0; text-align:center; font-size:0.7rem; opacity:0.4; letter-spacing:2px;">OR JOIN CODE</div>
    <input id="roomInput" placeholder="6-DIGIT CODE">
    <button onclick="window.joinArena()" style="background:var(--glass); border:1px solid var(--neon-pink);">Link to Arena</button>
    <button onclick="window.logout()" style="margin-top:20px; background:none; color:#ff4444; font-size:0.7rem;">Disconnect</button>
  </div>

  <div id="game" class="hidden">
    <div class="arena-code-banner" onclick="window.copyRoomId()">
      <small>Tap to copy Arena Code</small>
      <strong id="displayRoomId">------</strong>
    </div>

    <div class="series-score-box">
      <small>Round \ X Wins \ O Wins</small>
      <strong id="seriesScoreDisplay">1 \ 0 \ 0</strong>
    </div>

    <div class="status-pill" id="status">Syncing...</div>
    
    <div style="display:flex; justify-content:space-between; font-size:0.75rem; margin-bottom:10px; font-weight:bold;">
      <span id="playerXInfo" style="color:var(--neon-cyan)">X: -</span>
      <span id="playerOInfo" style="color:var(--neon-pink)">O: -</span>
    </div>

    <div class="board" id="board"></div>
    
    <div style="display:flex; gap:10px;">
      <button onclick="window.leaveArena()" style="background:#333; flex:1; font-size:0.8rem;">Leave Arena</button>
      <button id="chatBtn" style="flex:1; background:var(--neon-pink); position:relative; font-size:0.8rem;">Messages 
        <div id="chatNotify" style="position:absolute; top:-5px; right:-5px; width:12px; height:12px; background:red; border-radius:50%; display:none; border:2px solid #fff;"></div>
      </button>
    </div>

    <div class="chat-popup" id="chatPopup">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom:5px;">
        <small style="color:var(--neon-cyan); font-weight:bold; letter-spacing:1px;">COMMS SECURE</small>
        <small onclick="document.getElementById('chatPopup').classList.remove('show')" style="cursor:pointer; color:red;">[X]</small>
      </div>
      <div class="chat-messages" id="chatMessages"></div>
      <div id="typingIndicator" class="typing">Signal incoming <span class="dot-flashing"></span></div>
      <div style="display:flex; gap:8px;">
        <input id="chatInput" placeholder="Enter signal..." style="margin:0; font-size:0.8rem; border-radius: 20px;">
        <button onclick="window.sendMessage()" style="width:45px; height:45px; margin:0; border-radius:50%; display:flex; justify-content:center; align-items:center;">
           <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getDatabase, ref, set, update, onValue, get, push, onChildAdded, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyA6BAyRwyUvon6D88tbOVu_BuH14jzHGJI",
  authDomain: "tictaconline-5b2d4.firebaseapp.com",
  projectId: "tictaconline-5b2d4",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let user, roomId, gameRef, playerSide = "";
let board = ["","","","","","","","",""];
let isProcessingRound = false;

window.signUp = () => {
  const e = document.getElementById("email").value;
  const p = document.getElementById("password").value;
  createUserWithEmailAndPassword(auth, e, p).catch(err => alert(err.message));
};

window.signIn = () => {
  const e = document.getElementById("email").value;
  const p = document.getElementById("password").value;
  signInWithEmailAndPassword(auth, e, p).catch(err => alert(err.message));
};

window.logout = () => signOut(auth);

window.copyRoomId = () => {
  const el = document.getElementById("displayRoomId");
  navigator.clipboard.writeText(el.innerText).then(() => alert("Arena code copied!"));
};

window.createArena = async () => {
  const userRef = ref(db, "users/" + user.uid);
  const snap = await get(userRef);
  const data = snap.val();

  if(!data.playPoints || data.playPoints < 10) return alert("Insufficient ⭐!");
  await update(userRef, { playPoints: data.playPoints - 10 });
  
  roomId = Math.random().toString(36).substr(2, 6).toUpperCase();
  playerSide = "X";
  gameRef = ref(db, "arenas/" + roomId);
  isProcessingRound = false;
  
  await set(gameRef, {
    board: ["","","","","","","","",""],
    turn: "X",
    winner: "",
    roundNum: 1,
    xWins: 0,
    oWins: 0,
    playerX: { uid: user.uid, name: data.name, level: data.level },
    playerO: null,
    createdAt: serverTimestamp()
  });
  startGame();
};

window.joinArena = async () => {
  const inputCode = document.getElementById("roomInput").value.trim().toUpperCase();
  if(!inputCode) return alert("Enter Code");
  roomId = inputCode;
  playerSide = "O";
  isProcessingRound = false;
  const s = await get(ref(db, "users/" + user.uid));
  gameRef = ref(db, "arenas/" + roomId);
  update(gameRef, { playerO: { uid: user.uid, name: s.val().name, level: s.val().level } });
  startGame();
};

function startGame() {
  document.getElementById("menu").classList.add("hidden");
  document.getElementById("game").classList.remove("hidden");
  document.getElementById("displayRoomId").innerText = roomId;
  
  onValue(gameRef, s => {
    const d = s.val();
    if(!d) return;
    board = d.board;
    drawBoard();
    
    // Update Score UI
    document.getElementById("seriesScoreDisplay").innerText = `${d.roundNum} \\ ${d.xWins} \\ ${d.oWins}`;
    
    document.getElementById("playerXInfo").innerText = d.playerX ? `X: ${d.playerX.name}` : "X: Waiting...";
    document.getElementById("playerOInfo").innerText = d.playerO ? `O: ${d.playerO.name}` : "O: Waiting...";
    
    if(d.winner && !isProcessingRound) {
        isProcessingRound = true;
        handleRoundTransition(d);
    } else if(!d.winner) {
        isProcessingRound = false;
        document.getElementById("status").innerText = d.turn === playerSide ? "Your Move" : "Opponent Move";
    }
  });

  const chatContainer = document.getElementById("chatMessages");
  const typingIndicator = document.getElementById("typingIndicator");

  onChildAdded(ref(db, `arenas/${roomId}/chat`), s => {
    const m = s.val();
    const isMe = m.uid === user.uid;
    if (!isMe) {
      typingIndicator.style.display = "block";
      setTimeout(() => {
        typingIndicator.style.display = "none";
        renderMessage(m, isMe);
      }, 1500);
    } else {
      renderMessage(m, isMe);
    }
  });
}

async function handleRoundTransition(d) {
    let nx = d.xWins;
    let no = d.oWins;
    let round = d.roundNum;

    if(d.winner === "X") nx++;
    if(d.winner === "O") no++;

    document.getElementById("status").innerText = d.winner === "Draw" ? "Round Neutralized!" : `${d.winner} takes the round!`;

    setTimeout(async () => {
        if(round >= 7 || nx >= 4 || no >= 4) {
            const finalWinner = nx > no ? "X" : (no > nx ? "O" : "Draw");
            document.getElementById("status").innerText = "SERIES ENDED";
            await handleEndGameStats(finalWinner);
            alert(`Series Concluded! Final Score: ${nx} - ${no}`);
            window.leaveArena();
        } else {
            await update(gameRef, {
                board: ["","","","","","","","",""],
                turn: "X",
                winner: "",
                roundNum: round + 1,
                xWins: nx,
                oWins: no
            });
        }
    }, 2500);
}

function renderMessage(m, isMe) {
  const chatContainer = document.getElementById("chatMessages");
  const div = document.createElement("div");
  div.className = `msg-bubble ${isMe ? 'msg-me' : 'msg-them'}`;
  div.innerHTML = `<strong>${m.name}</strong>${m.text}`;
  chatContainer.appendChild(div);
  chatContainer.scrollTop = chatContainer.scrollHeight;
  if(!document.getElementById("chatPopup").classList.contains("show")) {
    document.getElementById("chatNotify").style.display = "block";
  }
}

async function handleEndGameStats(winner) {
    const userRef = ref(db, "users/" + user.uid);
    const snap = await get(userRef);
    const data = snap.val();
    
    let gainedExp = winner === playerSide ? 50 : (winner === "Draw" ? 20 : 10);
    let gainedPP = winner === playerSide ? 100 : 0;
    
    let newExp = (data.exp || 0) + gainedExp;
    let newLvl = data.level || 1;
    while (newExp >= 100 && newLvl < 99) { newExp -= 100; newLvl++; }

    update(userRef, {
        exp: newExp,
        level: newLvl,
        playPoints: (data.playPoints || 0) + gainedPP,
        pebbles: (data.pebbles || 0) + (winner === playerSide ? 10 : 2)
    });
}

function drawBoard() {
  const bEl = document.getElementById("board");
  bEl.innerHTML = "";
  board.forEach((v, i) => {
    const c = document.createElement("div");
    c.className = "cell";
    if(v === "X") c.classList.add("x-mark");
    if(v === "O") c.classList.add("o-mark");
    c.innerText = v;
    c.onclick = () => {
      get(gameRef).then(s => {
        const d = s.val();
        if(!board[i] && d.turn === playerSide && !d.winner && d.playerO) {
          board[i] = playerSide;
          const winner = checkWinner(board);
          update(gameRef, { board, turn: playerSide === "X" ? "O" : "X", winner });
        }
      });
    };
    bEl.appendChild(c);
  });
}

function checkWinner(b) {
  const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  for(let [a,b1,c] of lines) if(b[a] && b[a]===b[b1] && b[a]===b[c]) return b[a];
  return !b.includes("") ? "Draw" : "";
}

window.sendMessage = () => {
  const input = document.getElementById("chatInput");
  if(!input.value) return;
  push(ref(db, `arenas/${roomId}/chat`), { 
    uid: user.uid, 
    name: user.email.split("@")[0], 
    text: input.value,
    timestamp: serverTimestamp() 
  });
  input.value = "";
};

window.leaveArena = () => location.reload();

document.getElementById("chatBtn").onclick = () => {
  document.getElementById("chatPopup").classList.toggle("show");
  document.getElementById("chatNotify").style.display = "none";
};

onAuthStateChanged(auth, u => {
  if(u) {
    user = u;
    document.getElementById("auth").classList.add("hidden");
    document.getElementById("menu").classList.remove("hidden");
    const uRef = ref(db, "users/" + u.uid);
    get(uRef).then(s => {
      if(!s.exists()) set(uRef, { name: u.email.split("@")[0], level: 1, exp: 0, pebbles: 10, playPoints: 100 });
    });
    onValue(uRef, s => {
      const d = s.val(); if(!d) return;
      document.getElementById("playerName").innerText = d.name;
      document.getElementById("level").innerText = d.level;
      document.getElementById("pebbles").innerText = d.pebbles;
      document.getElementById("ppDisplay").innerText = d.playPoints || 0;
      let percent = d.level >= 99 ? 100 : d.exp;
      document.getElementById("levelProgress").style.width = percent + "%";
    });
  } else {
    document.getElementById("auth").classList.remove("hidden");
    document.getElementById("menu").classList.add("hidden");
    document.getElementById("game").classList.add("hidden");
  }
});
</script>
</body>
</html>
